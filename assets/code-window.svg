<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Syntax highlighting colors -->
    <style>
      .keyword { fill: #a45939; font-weight: 600; }
      .string { fill: #eccf9f; }
      .variable { fill: #e0e0e0; }
      .comment { fill: #6a6a6a; font-style: italic; }
      .function { fill: #a45939; }
      .code-text { font-family: 'Courier New', monospace; font-size: 16px; }
    </style>
  </defs>
  
  <!-- Window background -->
  <rect width="800" height="400" rx="10" fill="url(#bgGradient)"/>
  
  <!-- Window border -->
  <rect width="800" height="400" rx="10" fill="none" stroke="#412521" stroke-width="2"/>
  
  <!-- Title bar -->
  <rect width="800" height="35" rx="10" fill="#412521"/>
  
  <!-- Window buttons -->
  <circle cx="20" cy="17" r="6" fill="#eccf9f"/>
  <circle cx="45" cy="17" r="6" fill="#a45939"/>
  <circle cx="70" cy="17" r="6" fill="#412521" stroke="#eccf9f" stroke-width="1"/>
  
  <!-- File name -->
  <text x="400" y="23" text-anchor="middle" fill="#eccf9f" font-family="'Courier New', monospace" font-size="14">about-me.js</text>
  
  <!-- Line numbers -->
  <text x="15" y="75" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">1</text>
  <text x="15" y="100" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">2</text>
  <text x="15" y="125" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">3</text>
  <text x="15" y="150" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">4</text>
  <text x="15" y="175" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">5</text>
  <text x="15" y="200" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">6</text>
  <text x="15" y="225" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">7</text>
  <text x="15" y="250" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">8</text>
  <text x="15" y="275" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">9</text>
  <text x="15" y="300" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">10</text>
  <text x="15" y="325" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">11</text>
  <text x="15" y="350" fill="#6a6a6a" font-family="'Courier New', monospace" font-size="14">12</text>
  
  <!-- Code content -->
  <!-- Line 1 -->
  <text x="45" y="75" class="code-text keyword">const</text>
  <text x="105" y="75" class="code-text variable">developer</text>
  <text x="215" y="75" class="code-text variable">=</text>
  <text x="235" y="75" class="code-text variable">{</text>
  
  <!-- Line 2 -->
  <text x="65" y="100" class="code-text variable">name:</text>
  <text x="135" y="100" class="code-text string">"4luck4"</text>
  <text x="215" y="100" class="code-text variable">,</text>
  
  <!-- Line 3 -->
  <text x="65" y="125" class="code-text variable">role:</text>
  <text x="135" y="125" class="code-text string">"Full-Stack Developer"</text>
  <text x="345" y="125" class="code-text variable">,</text>
  
  <!-- Line 4 -->
  <text x="65" y="150" class="code-text variable">passion:</text>
  <text x="155" y="150" class="code-text string">"Creating Interactive Experiences"</text>
  <text x="455" y="150" class="code-text variable">,</text>
  
  <!-- Line 5 -->
  <text x="65" y="175" class="code-text variable">skills:</text>
  <text x="145" y="175" class="code-text variable">[</text>
  <text x="160" y="175" class="code-text string">"React"</text>
  <text x="235" y="175" class="code-text variable">,</text>
  <text x="250" y="175" class="code-text string">"Three.js"</text>
  <text x="345" y="175" class="code-text variable">,</text>
  <text x="360" y="175" class="code-text string">"Node.js"</text>
  <text x="455" y="175" class="code-text variable">],</text>
  
  <!-- Line 6 -->
  <text x="65" y="200" class="code-text variable">currentFocus:</text>
  <text x="205" y="200" class="code-text string">"WebGL &amp; 3D Graphics"</text>
  <text x="405" y="200" class="code-text variable">,</text>
  
  <!-- Line 7 -->
  <text x="65" y="225" class="code-text variable">learning:</text>
  <text x="165" y="225" class="code-text keyword">true</text>
  <text x="215" y="225" class="code-text variable">,</text>
  
  <!-- Line 8 -->
  <text x="65" y="250" class="code-text variable">coffee:</text>
  <text x="145" y="250" class="code-text string">"☕ Always"</text>
  <text x="265" y="250" class="code-text variable">,</text>
  
  <!-- Line 9 -->
  <text x="65" y="275" class="code-text function">code</text>
  <text x="115" y="275" class="code-text variable">:</text>
  <text x="135" y="275" class="code-text variable">()</text>
  <text x="165" y="275" class="code-text keyword">=&gt;</text>
  <text x="205" y="275" class="code-text string">"Turning ideas into reality"</text>
  
  <!-- Line 10 -->
  <text x="45" y="300" class="code-text variable">};</text>
  
  <!-- Line 11 (empty) -->
  
  <!-- Line 12 -->
  <text x="45" y="350" class="code-text comment">// Let's build something amazing together! 🚀</text>
  
  <!-- Cursor blink animation -->
  <rect x="485" y="260" width="10" height="18" fill="#eccf9f">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
