<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" rx="15" fill="url(#cardBg)"/>
  <rect width="800" height="200" rx="15" fill="none" stroke="#412521" stroke-width="2"/>
  
  <!-- Profile Image Circle -->
  <circle cx="100" cy="100" r="70" fill="#412521"/>
  <image href="../images/profile.gif" x="30" y="30" width="140" height="140" clip-path="circle(70px at 70px 70px)"/>
  
  <!-- Decorative line -->
  <line x1="200" y1="50" x2="200" y2="150" stroke="#412521" stroke-width="2"/>
  
  <!-- Name -->
  <text x="230" y="70" fill="#eccf9f" font-size="32" font-weight="700" font-family="'Segoe UI', sans-serif">4luck4</text>
  
  <!-- Roles -->
  <text x="230" y="105" fill="#a45939" font-size="18" font-weight="600" font-family="'Segoe UI', sans-serif">Full-Stack Developer</text>
  <text x="230" y="130" fill="#eccf9f" font-size="16" font-family="'Segoe UI', sans-serif">Bot Developer • Creative Coder</text>
  
  <!-- Stats -->
  <rect x="230" y="145" width="120" height="30" rx="5" fill="#412521"/>
  <text x="290" y="165" text-anchor="middle" fill="#eccf9f" font-size="14" font-weight="600" font-family="'Segoe UI', sans-serif">🍩 Donut Lover</text>
  
  <rect x="360" y="145" width="100" height="30" rx="5" fill="#a45939"/>
  <text x="410" y="165" text-anchor="middle" fill="white" font-size="14" font-weight="600" font-family="'Segoe UI', sans-serif">☕ Coffee</text>
  
  <rect x="470" y="145" width="100" height="30" rx="5" fill="#eccf9f"/>
  <text x="520" y="165" text-anchor="middle" fill="#412521" font-size="14" font-weight="600" font-family="'Segoe UI', sans-serif">💻 Coding</text>
</svg>
