<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Window</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 20px;
        }
        
        .download-btn {
            padding: 12px 24px;
            background: #a45939;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        
        .download-btn:hover {
            background: #eccf9f;
            color: #412521;
        }
        
        .code-window {
            width: 800px;
            height: 400px;
            background: linear-gradient(180deg, #2d2d2d 0%, #1a1a1a 100%);
            border-radius: 10px;
            border: 2px solid #412521;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
        }
        
        .title-bar {
            height: 35px;
            background: #412521;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-radius: 10px 10px 0 0;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
        }
        
        .button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .button.close { background: #eccf9f; }
        .button.minimize { background: #a45939; }
        .button.maximize { 
            background: #412521; 
            border: 1px solid #eccf9f;
        }
        
        .filename {
            flex: 1;
            text-align: center;
            color: #eccf9f;
            font-size: 14px;
        }
        
        .code-content {
            display: flex;
            padding: 20px 0;
        }
        
        .line-numbers {
            padding: 0 15px;
            color: #6a6a6a;
            font-size: 16px;
            line-height: 25px;
            text-align: right;
            user-select: none;
        }
        
        .code {
            flex: 1;
            color: #e0e0e0;
            font-size: 16px;
            line-height: 25px;
            padding-right: 20px;
        }
        
        .keyword { color: #a45939; font-weight: 600; }
        .string { color: #eccf9f; }
        .comment { color: #6a6a6a; font-style: italic; }
        .function { color: #a45939; }
    </style>
</head>
<body>
    <button class="download-btn" onclick="downloadPNG()">Download PNG (High Quality)</button>
    
    <div class="code-window" id="codeWindow">
        <div class="title-bar">
            <div class="buttons">
                <div class="button close"></div>
                <div class="button minimize"></div>
                <div class="button maximize"></div>
            </div>
            <div class="filename">about-me.js</div>
        </div>
        
        <div class="code-content">
            <div class="line-numbers">
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
                <div>5</div>
                <div>6</div>
                <div>7</div>
                <div>8</div>
                <div>9</div>
                <div>10</div>
                <div>11</div>
                <div>12</div>
                <div>13</div>
            </div>
            
            <div class="code">
                <div><span class="keyword">const</span> developer = {</div>
                <div>  name: <span class="string">"4luck4"</span>,</div>
                <div>  role: <span class="string">"Full-Stack & Bot Developer"</span>,</div>
                <div>  passion: <span class="string">"idk"</span>,</div>
                <div>  favoriteThing: <span class="string">"I love donuts"</span>,</div>
                <div>  currentFocus: <span class="string">"Backend & Automation"</span>,</div>
                <div>  learning: <span class="keyword">true</span>,</div>
                <div>  coffee: <span class="string">"Always"</span>,</div>
                <div>  <span class="function">code</span>: () <span class="keyword">=></span> <span class="string">"Speed isn’t everything…"</span></div>
                <div>};</div>
                <div></div> ⠀
                <div>                                  <span class="comment">// discord.gg/4luck4</span></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function downloadPNG() {
            const element = document.getElementById('codeWindow');
            
            html2canvas(element, {
                scale: 3,
                backgroundColor: null,
                logging: false,
                width: 800,
                height: 400,
                useCORS: true,
                allowTaint: true,
                scrollX: 0,
                scrollY: 0,
                windowWidth: 800,
                windowHeight: 400
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'code-window.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
